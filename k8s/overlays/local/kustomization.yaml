apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: laravel-prod

resources:
  - ../../base

images:
  - name: laravel-app
    newName: laravel-app
    newTag: local

patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/topologySpreadConstraints/0/whenUnsatisfiable
        value: ScheduleAnyway
    target:
      kind: Deployment
      name: laravel-app

  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: laravel-config
        namespace: laravel-prod
      data:
        APP_ENV: "local"
        APP_DEBUG: "true"
        APP_URL: "http://localhost:8080"
    target:
      kind: ConfigMap
      name: laravel-config