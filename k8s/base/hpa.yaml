apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: laravel-app-hpa
  namespace: laravel-prod
  labels:
    app.kubernetes.io/name: laravel-app
    app.kubernetes.io/managed-by: kustomize
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: laravel-app

  minReplicas: 2
  maxReplicas: 4

  metrics:
    # ── Scale on CPU utilization ─────────────────────────────────────────
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70   # scale up when avg CPU > 70%

    # ── Scale on Memory utilization ──────────────────────────────────────
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80   # scale up when avg memory > 80%

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30   # wait 30s before scaling up
      policies:
        - type: Pods
          value: 1
          periodSeconds: 30            # add max 1 pod every 30s
    scaleDown:
      stabilizationWindowSeconds: 120  # wait 2min before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60            # remove max 1 pod every 60s
