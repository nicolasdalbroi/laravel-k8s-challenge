apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: laravel-prod

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml

labels:
  - pairs:
      app.kubernetes.io/name: laravel-app
      app.kubernetes.io/version: "1.0.0"
