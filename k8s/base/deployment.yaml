apiVersion: apps/v1
kind: Deployment
metadata:
  name: laravel-app
  namespace: laravel-prod
  labels:
    app.kubernetes.io/name: laravel-app
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 2
  selector:
    matchLabels:
      app: laravel-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # zero-downtime deploys
  template:
    metadata:
      labels:
        app: laravel-app
    spec:
      # ── Security: drop all capabilities, run as non-root ──────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 82             # www-data on Alpine
        runAsGroup: 82
        fsGroup: 82

      containers:
        - name: laravel
          image: laravel-app:latest
          imagePullPolicy: IfNotPresent  # use local image loaded by deploy.sh

          ports:
            - containerPort: 9000
              name: fpm

          # ── Resource limits (required for HPA) ──────────────────────────
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

          # ── Environment from ConfigMap ───────────────────────────────────
          envFrom:
            - configMapRef:
                name: laravel-config

          # ── Sensitive env from Secret ────────────────────────────────────
          env:
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: laravel-secrets
                  key: APP_KEY

          # ── Liveness probe: is PHP-FPM alive and config valid? ──────────
          livenessProbe:
            exec:
              command:
                - php-fpm
                - -t
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5

          # ── Readiness probe: is PHP able to execute? ─────────────────────
          readinessProbe:
            exec:
              command:
                - php
                - -r
                - "echo 'ready';"
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5



      # ── Spread pods across nodes for resilience ──────────────────────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: laravel-app
